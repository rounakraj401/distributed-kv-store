<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Consistent Hash Ring with Virtual Nodes</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="540" fill="#F1EFE8" rx="12"/>

  <!-- Title -->
  <text font-family="monospace" font-size="13" font-weight="600" x="340" y="32" text-anchor="middle" fill="#2C2C2A">Consistent Hash Ring — Virtual Nodes</text>

  <!-- Ring -->
  <circle cx="340" cy="280" r="170" fill="none" stroke="#888780" stroke-width="1.5" opacity="0.3"/>
  <circle cx="340" cy="280" r="174" fill="none" stroke="#888780" stroke-width="0.5" opacity="0.12"/>

  <!-- Tick marks -->
  <g opacity="0.2" stroke="#5F5E5A" stroke-width="1">
    <line x1="340" y1="106" x2="340" y2="98"/>
    <line x1="422" y1="114" x2="427" y2="107"/>
    <line x1="490" y1="148" x2="496" y2="141"/>
    <line x1="514" y1="215" x2="521" y2="213"/>
    <line x1="514" y1="355" x2="521" y2="358"/>
    <line x1="462" y1="422" x2="467" y2="430"/>
    <line x1="340" y1="450" x2="340" y2="458"/>
    <line x1="218" y1="422" x2="213" y2="430"/>
    <line x1="166" y1="345" x2="158" y2="348"/>
    <line x1="166" y1="215" x2="158" y2="213"/>
    <line x1="218" y1="140" x2="213" y2="132"/>
    <line x1="270" y1="112" x2="267" y2="104"/>
  </g>

  <!-- Node A — top, purple -->
  <rect x="285" y="83" width="110" height="44" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="340" y="101" text-anchor="middle" fill="#26215C">Node A</text>
  <text font-family="monospace" font-size="11" x="340" y="118" text-anchor="middle" fill="#3C3489">pos: 0°</text>

  <!-- Node B — right, teal -->
  <rect x="476" y="258" width="110" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="531" y="276" text-anchor="middle" fill="#04342C">Node B</text>
  <text font-family="monospace" font-size="11" x="531" y="293" text-anchor="middle" fill="#085041">pos: 90°</text>

  <!-- Node C — bottom, coral -->
  <rect x="285" y="433" width="110" height="44" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="340" y="451" text-anchor="middle" fill="#4A1B0C">Node C</text>
  <text font-family="monospace" font-size="11" x="340" y="468" text-anchor="middle" fill="#712B13">pos: 180°</text>

  <!-- Node D — left, amber -->
  <rect x="94" y="258" width="110" height="44" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="149" y="276" text-anchor="middle" fill="#412402">Node D</text>
  <text font-family="monospace" font-size="11" x="149" y="293" text-anchor="middle" fill="#633806">pos: 270°</text>

  <!-- Virtual nodes -->
  <circle cx="392" cy="112" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
  <text font-family="monospace" font-size="10" x="392" y="99" text-anchor="middle" fill="#3C3489">A₂</text>

  <circle cx="448" cy="358" r="7" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
  <text font-family="monospace" font-size="10" x="463" y="372" text-anchor="start" fill="#3C3489">A₃</text>

  <circle cx="482" cy="194" r="7" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text font-family="monospace" font-size="10" x="496" y="192" text-anchor="start" fill="#085041">B₂</text>

  <circle cx="400" cy="444" r="7" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text font-family="monospace" font-size="10" x="414" y="458" text-anchor="start" fill="#085041">B₃</text>

  <circle cx="228" cy="424" r="7" fill="#F5C4B3" stroke="#993C1D" stroke-width="1"/>
  <text font-family="monospace" font-size="10" x="212" y="438" text-anchor="end" fill="#712B13">C₂</text>

  <circle cx="168" cy="200" r="7" fill="#F5C4B3" stroke="#993C1D" stroke-width="1"/>
  <text font-family="monospace" font-size="10" x="153" y="194" text-anchor="end" fill="#712B13">C₃</text>

  <circle cx="278" cy="448" r="7" fill="#FAC775" stroke="#854F0B" stroke-width="1"/>
  <text font-family="monospace" font-size="10" x="263" y="463" text-anchor="end" fill="#633806">D₂</text>

  <circle cx="488" cy="344" r="7" fill="#FAC775" stroke="#854F0B" stroke-width="1"/>
  <text font-family="monospace" font-size="10" x="502" y="358" text-anchor="start" fill="#633806">D₃</text>

  <!-- Key routing example -->
  <circle cx="510" cy="168" r="8" fill="#185FA5" stroke="#0C447C" stroke-width="1.5"/>
  <text font-family="monospace" font-size="10" x="524" y="165" text-anchor="start" fill="#185FA5">user:42</text>
  <path d="M510 176 Q522 208 516 252" fill="none" stroke="#185FA5" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow-blue)" opacity="0.75"/>

  <!-- Clockwise label -->
  <path d="M392 110 A175 175 0 0 1 510 278" fill="none" stroke="#888780" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow)" opacity="0.35"/>
  <text font-family="monospace" font-size="10" x="478" y="168" text-anchor="start" fill="#5F5E5A" opacity="0.7">clockwise</text>

  <!-- Legend -->
  <rect x="40" y="512" width="11" height="11" rx="2" fill="#AFA9EC"/>
  <text font-family="monospace" font-size="10" x="57" y="522" fill="#5F5E5A">Physical node</text>
  <circle cx="172" cy="517" r="6" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
  <text font-family="monospace" font-size="10" x="184" y="522" fill="#5F5E5A">Virtual node</text>
  <circle cx="288" cy="517" r="6" fill="#185FA5" stroke="#0C447C" stroke-width="1"/>
  <text font-family="monospace" font-size="10" x="300" y="522" fill="#5F5E5A">Key (routes clockwise to nearest node)</text>
</svg>
