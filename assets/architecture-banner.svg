<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Distributed KV Store Architecture</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="320" fill="#F1EFE8" rx="12"/>

  <!-- Client box -->
  <rect x="260" y="20" width="160" height="52" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="monospace" font-size="14" font-weight="600" x="340" y="41" text-anchor="middle" fill="#2C2C2A">Client</text>
  <text font-family="monospace" font-size="11" x="340" y="60" text-anchor="middle" fill="#5F5E5A">External requests</text>

  <!-- Arrow Client → Router -->
  <line x1="340" y1="72" x2="340" y2="105" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Router box -->
  <rect x="185" y="105" width="310" height="54" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="monospace" font-size="14" font-weight="600" x="340" y="126" text-anchor="middle" fill="#26215C">Consistent Hash Router</text>
  <text font-family="monospace" font-size="11" x="340" y="147" text-anchor="middle" fill="#3C3489">Hashing · Replication · Quorum · Retry</text>

  <!-- Fan-out arrows -->
  <line x1="234" y1="159" x2="90" y2="213" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="295" y1="159" x2="250" y2="213" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="385" y1="159" x2="430" y2="213" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="446" y1="159" x2="590" y2="213" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Node A -->
  <rect x="30" y="213" width="120" height="68" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="90" y="233" text-anchor="middle" fill="#04342C">Node A</text>
  <text font-family="monospace" font-size="11" x="90" y="250" text-anchor="middle" fill="#085041">:8081</text>
  <text font-family="monospace" font-size="10" x="90" y="267" text-anchor="middle" fill="#085041">LSM · WAL · SSTable</text>

  <!-- Node B -->
  <rect x="188" y="213" width="120" height="68" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="248" y="233" text-anchor="middle" fill="#04342C">Node B</text>
  <text font-family="monospace" font-size="11" x="248" y="250" text-anchor="middle" fill="#085041">:8082</text>
  <text font-family="monospace" font-size="10" x="248" y="267" text-anchor="middle" fill="#085041">LSM · WAL · SSTable</text>

  <!-- Node C -->
  <rect x="372" y="213" width="120" height="68" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="432" y="233" text-anchor="middle" fill="#04342C">Node C</text>
  <text font-family="monospace" font-size="11" x="432" y="250" text-anchor="middle" fill="#085041">:8083</text>
  <text font-family="monospace" font-size="10" x="432" y="267" text-anchor="middle" fill="#085041">LSM · WAL · SSTable</text>

  <!-- Node D -->
  <rect x="530" y="213" width="120" height="68" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="590" y="233" text-anchor="middle" fill="#04342C">Node D</text>
  <text font-family="monospace" font-size="11" x="590" y="250" text-anchor="middle" fill="#085041">:8084</text>
  <text font-family="monospace" font-size="10" x="590" y="267" text-anchor="middle" fill="#085041">LSM · WAL · SSTable</text>

  <!-- Health dots -->
  <circle cx="148" cy="222" r="5" fill="#1D9E75"/>
  <circle cx="306" cy="222" r="5" fill="#1D9E75"/>
  <circle cx="490" cy="222" r="5" fill="#1D9E75"/>
  <circle cx="648" cy="222" r="5" fill="#1D9E75"/>

  <!-- Legend -->
  <circle cx="42" cy="298" r="5" fill="#1D9E75"/>
  <text font-family="monospace" font-size="11" x="54" y="302" fill="#5F5E5A">Node healthy</text>
  <rect x="168" y="292" width="11" height="11" rx="2" fill="#AFA9EC"/>
  <text font-family="monospace" font-size="11" x="184" y="302" fill="#5F5E5A">Router layer</text>
  <rect x="290" y="292" width="11" height="11" rx="2" fill="#9FE1CB"/>
  <text font-family="monospace" font-size="11" x="306" y="302" fill="#5F5E5A">Storage node (LSM engine)</text>
</svg>
