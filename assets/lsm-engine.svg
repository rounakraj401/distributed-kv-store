<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LSM-inspired Storage Engine — Write and Read Paths</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="400" fill="#F1EFE8" rx="12"/>

  <!-- WRITE PATH label -->
  <text font-family="monospace" font-size="11" font-weight="600" x="44" y="36" fill="#5F5E5A">WRITE PATH</text>
  <line x1="40" y1="42" x2="330" y2="42" stroke="#888780" stroke-width="0.5" opacity="0.4"/>

  <!-- Write -->
  <rect x="40" y="54" width="80" height="40" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="80" y="79" text-anchor="middle" fill="#2C2C2A">Write</text>

  <line x1="120" y1="74" x2="158" y2="74" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WAL -->
  <rect x="158" y="54" width="100" height="40" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="208" y="69" text-anchor="middle" fill="#412402">WAL</text>
  <text font-family="monospace" font-size="10" x="208" y="85" text-anchor="middle" fill="#633806">crash-safe log</text>

  <line x1="258" y1="74" x2="296" y2="74" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MemTable -->
  <rect x="296" y="54" width="124" height="40" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="358" y="69" text-anchor="middle" fill="#26215C">MemTable</text>
  <text font-family="monospace" font-size="10" x="358" y="85" text-anchor="middle" fill="#3C3489">in-memory buffer</text>

  <!-- Flush arrow -->
  <line x1="358" y1="94" x2="358" y2="128" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="monospace" font-size="10" x="370" y="118" text-anchor="start" fill="#5F5E5A">flush</text>

  <!-- SSTables stacked -->
  <rect x="258" y="128" width="200" height="38" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="12" font-weight="600" x="358" y="142" text-anchor="middle" fill="#04342C">SSTable (newest)</text>
  <text font-family="monospace" font-size="10" x="358" y="158" text-anchor="middle" fill="#085041">immutable on-disk file</text>

  <rect x="266" y="172" width="200" height="38" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5" opacity="0.75"/>
  <text font-family="monospace" font-size="12" font-weight="600" x="366" y="186" text-anchor="middle" fill="#04342C">SSTable</text>
  <text font-family="monospace" font-size="10" x="366" y="202" text-anchor="middle" fill="#085041">older file</text>

  <rect x="274" y="216" width="200" height="38" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5" opacity="0.5"/>
  <text font-family="monospace" font-size="12" font-weight="600" x="374" y="230" text-anchor="middle" fill="#04342C">SSTable (oldest)</text>
  <text font-family="monospace" font-size="10" x="374" y="246" text-anchor="middle" fill="#085041">oldest file</text>

  <!-- Compaction loop -->
  <path d="M474 191 Q562 191 562 272 Q562 308 476 308" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-teal)"/>
  <text font-family="monospace" font-size="10" x="570" y="188" fill="#085041">compact</text>
  <text font-family="monospace" font-size="10" x="570" y="202" fill="#085041">+ dedupe</text>
  <text font-family="monospace" font-size="10" x="570" y="216" fill="#085041">+ tombstones</text>

  <!-- Compacted SSTable -->
  <rect x="258" y="288" width="200" height="38" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="12" font-weight="600" x="358" y="302" text-anchor="middle" fill="#04342C">Compacted SSTable</text>
  <text font-family="monospace" font-size="10" x="358" y="318" text-anchor="middle" fill="#085041">merged · cleaned up</text>

  <!-- READ PATH label -->
  <text font-family="monospace" font-size="11" font-weight="600" x="44" y="192" fill="#5F5E5A">READ PATH</text>
  <line x1="40" y1="198" x2="112" y2="198" stroke="#888780" stroke-width="0.5" opacity="0.4"/>

  <!-- Read request -->
  <rect x="40" y="210" width="90" height="38" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="monospace" font-size="12" font-weight="600" x="85" y="224" text-anchor="middle" fill="#2C2C2A">Read</text>
  <text font-family="monospace" font-size="10" x="85" y="240" text-anchor="middle" fill="#5F5E5A">request</text>

  <line x1="85" y1="248" x2="85" y2="276" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Check MemTable -->
  <rect x="40" y="276" width="90" height="38" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="monospace" font-size="12" font-weight="600" x="85" y="290" text-anchor="middle" fill="#26215C">MemTable</text>
  <text font-family="monospace" font-size="10" x="85" y="306" text-anchor="middle" fill="#3C3489">check first</text>

  <line x1="85" y1="314" x2="85" y2="344" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SSTables read -->
  <rect x="40" y="344" width="90" height="38" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="12" font-weight="600" x="85" y="358" text-anchor="middle" fill="#04342C">SSTables</text>
  <text font-family="monospace" font-size="10" x="85" y="374" text-anchor="middle" fill="#085041">newest → oldest</text>

  <!-- Miss path from MemTable to SSTable scan -->
  <path d="M130 295 Q148 295 148 195 Q148 148 256 148" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.5"/>
  <text font-family="monospace" font-size="10" x="136" y="232" text-anchor="start" fill="#5F5E5A" opacity="0.7">miss →</text>
  <text font-family="monospace" font-size="10" x="136" y="246" text-anchor="start" fill="#5F5E5A" opacity="0.7">scan</text>
</svg>
