<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Replication and Quorum Write Flow</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="400" fill="#F1EFE8" rx="12"/>

  <!-- N W R config -->
  <rect x="468" y="16" width="60" height="52" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="498" y="36" text-anchor="middle" fill="#2C2C2A">N = 3</text>
  <text font-family="monospace" font-size="10" x="498" y="56" text-anchor="middle" fill="#5F5E5A">replicas</text>

  <rect x="540" y="16" width="60" height="52" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="570" y="36" text-anchor="middle" fill="#26215C">W = 2</text>
  <text font-family="monospace" font-size="10" x="570" y="56" text-anchor="middle" fill="#3C3489">write Q</text>

  <rect x="612" y="16" width="60" height="52" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="642" y="36" text-anchor="middle" fill="#04342C">R = 2</text>
  <text font-family="monospace" font-size="10" x="642" y="56" text-anchor="middle" fill="#085041">read Q</text>

  <text font-family="monospace" font-size="10" x="570" y="84" text-anchor="middle" fill="#5F5E5A" opacity="0.75">R + W &gt; N  →  consistency</text>

  <!-- Client write -->
  <rect x="275" y="16" width="130" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="340" y="33" text-anchor="middle" fill="#2C2C2A">Client write</text>
  <text font-family="monospace" font-size="10" x="340" y="51" text-anchor="middle" fill="#5F5E5A">PUT user:42 → val</text>

  <line x1="340" y1="60" x2="340" y2="96" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Router -->
  <rect x="220" y="96" width="240" height="44" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="340" y="113" text-anchor="middle" fill="#26215C">Router (coordinator)</text>
  <text font-family="monospace" font-size="10" x="340" y="130" text-anchor="middle" fill="#3C3489">selects N=3 replicas · fans out · retries</text>

  <!-- Fan arrows to 3 replicas -->
  <line x1="276" y1="140" x2="122" y2="194" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="140" x2="340" y2="194" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="404" y1="140" x2="558" y2="194" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Replica 1 SUCCESS -->
  <rect x="52" y="194" width="140" height="58" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="12" font-weight="600" x="122" y="213" text-anchor="middle" fill="#04342C">Replica 1</text>
  <text font-family="monospace" font-size="10" x="122" y="229" text-anchor="middle" fill="#085041">Node A · :8081</text>
  <text font-family="monospace" font-size="11" font-weight="600" x="122" y="244" text-anchor="middle" fill="#0F6E56">✓ ACK</text>

  <!-- Replica 2 SUCCESS -->
  <rect x="270" y="194" width="140" height="58" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="12" font-weight="600" x="340" y="213" text-anchor="middle" fill="#04342C">Replica 2</text>
  <text font-family="monospace" font-size="10" x="340" y="229" text-anchor="middle" fill="#085041">Node B · :8082</text>
  <text font-family="monospace" font-size="11" font-weight="600" x="340" y="244" text-anchor="middle" fill="#0F6E56">✓ ACK</text>

  <!-- Replica 3 FAILED -->
  <rect x="488" y="194" width="140" height="58" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="monospace" font-size="12" font-weight="600" x="558" y="213" text-anchor="middle" fill="#4A1B0C">Replica 3</text>
  <text font-family="monospace" font-size="10" x="558" y="229" text-anchor="middle" fill="#712B13">Node C · :8083</text>
  <text font-family="monospace" font-size="11" font-weight="600" x="558" y="244" text-anchor="middle" fill="#993C1D">✗ timeout</text>

  <!-- ACK arrows back -->
  <line x1="122" y1="194" x2="294" y2="148" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow-teal)"/>
  <line x1="340" y1="194" x2="340" y2="148" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow-teal)"/>

  <!-- Quorum met -->
  <rect x="225" y="292" width="230" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="600" x="340" y="309" text-anchor="middle" fill="#04342C">Quorum met (2/3 ≥ W)</text>
  <text font-family="monospace" font-size="10" x="340" y="327" text-anchor="middle" fill="#085041">Write confirmed to client</text>

  <line x1="340" y1="252" x2="340" y2="292" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <!-- Anti-entropy repair -->
  <path d="M558 252 Q558 338 458 322" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.45"/>
  <text font-family="monospace" font-size="10" x="572" y="300" text-anchor="start" fill="#5F5E5A" opacity="0.75">anti-entropy</text>
  <text font-family="monospace" font-size="10" x="572" y="314" text-anchor="start" fill="#5F5E5A" opacity="0.75">heals later</text>

  <!-- Rollback note -->
  <text font-family="monospace" font-size="10" x="340" y="364" text-anchor="middle" fill="#5F5E5A" opacity="0.7">If fewer than W ACK → router rolls back successful replicas</text>

  <!-- Legend -->
  <rect x="40" y="382" width="10" height="10" rx="2" fill="#9FE1CB"/>
  <text font-family="monospace" font-size="10" x="56" y="392" fill="#5F5E5A">ACK / success</text>
  <rect x="172" y="382" width="10" height="10" rx="2" fill="#F5C4B3"/>
  <text font-family="monospace" font-size="10" x="188" y="392" fill="#5F5E5A">Timeout / failure</text>
  <line x1="310" y1="387" x2="330" y2="387" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text font-family="monospace" font-size="10" x="336" y="392" fill="#5F5E5A">Quorum path</text>
</svg>
